<!DOCTYPE html>

<style>
    .adtcrt{
        background-color: rgb(255, 216, 20);
        border-radius: 14px;
        border: none;
        width: 100px;
        height: 25px;
        cursor: pointer;
        transition: background-color 0.15s, opacity 0.15s;
    }
    .adtcrt:hover{
        background-color: rgb(255, 202, 28);
    }
    .adtcrt:active{
        opacity: 0.5;
    }

    .bn{
        background-color: rgb(255, 164, 28);
        border-radius: 14px;
        border: none;
        width: 100px;
        height: 25px;
        cursor: pointer;
        transition: background-color 0.15s, opacity 0.15s;
    }
    .bn:hover{
        background-color: rgb(255, 145, 0);
    }
    .bn:active{
        opacity: 0.5;
    }
    
    .link1:hover{
        color: rgb(255, 164, 28);
    }
</style>

<html>
    <head></head>
    <body>
        <a class="link1" href="#">Back to Amazon</a>
        <p style="color: green;">$39 - in stock.</p>
        <p>Free delivery tomorrow.</p>
        <button class="adtcrt">Add to Cart</button>
        <button class="bn">Buy now</button>
    </body>
    </html>
    <h1>Nike Black Running Shoes</h1>
