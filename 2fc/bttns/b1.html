<style>
    .uber-button{
        color: white;
        background-color: black;
        border-style: solid;
        border: none;
        width: 105px;
        height: 30px;
        margin: 8px;
        text-align: center;
        cursor: pointer;
        transition: opacity 0.15s;
    }
    .uber-button:hover{
        opacity: 0.5;
    }

    .amazon-button{
        background-color: rgb(255, 216, 20);
        border: none;
        border-radius: 17px;
        margin: 8px;
        width: 120px;
        height: 32px;
        cursor: pointer;
        transition: background-color 0.15s;
    }
    .amazon-button:hover{
        background-color: rgb(255, 191, 0);
    }

    .github-button{
        color: white;
        background-color: rgb(46, 164, 79);
        border: none;
        border-radius: 7px;
        width: 70px;
        height: 40px;
        margin: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: box-shadow 0.15s;
    }
    .github-button:hover{
        box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.15)
    }

    .bootstrap-button1{
        color: white;
        background-color: rgb(121, 82, 179);
        border: none;
        border-radius: 4px;
        font-weight: bold;
        width: 90px;
        height: 30px;
        margin:8px;
        cursor: pointer;
        transition: background-color 0.15s;
    }
    .bootstrap-button1:hover{
        background-color: rgb(79, 53, 118);
    }

    .bootstrap-button2{
        color: gray;
        background-color: white;
        border-color: gray;
        border-style: solid;
        border-width: 1px;
        border-radius: 4px;
        margin: 8px;
        font-weight: bold;
        width: 90px;
        height: 30px;
        cursor: pointer;
        transition: background-color 0.25s, color 0.25s;
    }
    .bootstrap-button2:hover{
        background-color: gray;
        color: white;
    }

    .linkedin-button1{
        background-color: rgb(10, 102, 194);
        color: white;
        border: none;
        border-radius: 16px;
        width: 195px;
        height: 28px;
        margin: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.15s;
    }
    .linkedin-button1:hover{
        background-color: rgb(7, 76, 144);
    }
    .linkedin-button2{
        background-color: white;
        color: rgb(10, 102, 194);
        border-color: rgb(10, 102, 194);
        font-weight: bold;
        border-radius: 16px;
        width: 50px;
        height: 28px;
        margin: 8px;
        border-style: solid;
        border-width: 1px;
        cursor: pointer;
        transition: background-color 0.15s, border-width 0.15s;
    }
    .linkedin-button2:hover{
        background-color: rgba(12, 131, 250, 0.15);
        border-width: 2px;
    }
</style>

<html>
    <head>
        <title>Buttons-Practice</title>
    </head>
    <body style="background-color: white">
        <div><button class="uber-button">Request now</button></div>
        <div><button class="amazon-button">Add to Cart</button></div>
        <div><button class="github-button">Sign up</button></div>
        <div>
            <button class="bootstrap-button1">Get started</button>
            <button class="bootstrap-button2">Download</button>
        </div>
        <div>   
            <button class="linkedin-button1">Apply on company website</button>
            <button class="linkedin-button2">Save</button>
        </div>
    </body>
    </html>
