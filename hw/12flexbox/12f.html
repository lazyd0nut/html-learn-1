<!DOCTYPE html>
<html>
    <head>
        <title>12f</title>
        <style>
            .main-flex{
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                background-color: rgb(93, 86, 149);
                height: 50px;
            }            
            .left-section{
                width: 100px;
                padding-left: 15px;
            }
            .middle-section{
                max-width: 400px;
            }
            .right-section{
                text-align: center;
                width: 100px;
            }
            .searchbox-o{
                border: none;
                border-radius: 20px;
                width: 350px;
                padding: 8px;
                padding-left: 15px;
                padding-right: 15px;
            }
            .searchbox-o:focus, input:focus{
                outline: none;
                color: black;
            }
            .button-b{
                color: white;
                border-style: solid;
                border-radius: 3px;
                border-color: white;
                border-width: 1px;
                padding: 8px;
                background-color: rgba(255, 255, 255, 0);
            }
        </style>
    </head>
    <body style="font-family: Arial, Helvetica, sans-serif; margin: 0;">
        <div class="main-flex">
            <div class="left-section">
                <div style="color: white; font-weight: bold;">Home</div>
            </div>
            <div class="middle-section">
                <input class="searchbox-o" type="searchbox" placeholder="Search">
            </div>
            <div class="right-section">
                <button class="button-b">Download</button>
            </div>
        </div>
    </body>
</html>
