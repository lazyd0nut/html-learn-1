<!DOCTYPE html>

<html>
    <head>
        <title>Gmail IOS</title>
        <link rel="stylesheet" href="3Flex.css">
    </head>
    <body>
        <div class="main-container">
            <div class="all-inboxes-container">ALL INBOXES</div>
            
            <div class="inbox">
                <img class="icon" src="/3fc-tasks/9/imgs/corgi.jpg">
                <div class="info">
                    <div class="mail-title-flex">
                        <div class="mail-title">Chewy Promotions</div>
                        <div class="mail-time">4:58 PM</div>
                    </div>
                    <div class="mail-topic">Biggest sales of the year!</div>
                    <div class="mail-message">Hey there! We're writing to tell you about our...</div>
                </div>
            </div>

            <div class="inbox">
                <img class="icon" src="/3fc-tasks/9/imgs/cat1.webp">
                <div class="info">
                    <div class="mail-title-flex">
                        <div class="mail-title">Best Buy</div>
                        <div class="mail-time">12:32 PM</div>
                    </div>
                    <div class="mail-topic">Your Best Buy eReceipt</div>
                    <div class="mail-message">Thank you for shopping at Best Buy, here is...</div>
                </div>
            </div>

            <div class="inbox">
                <img class="icon" src="/3fc-tasks/9/imgs/dawg.jpg">
                <div class="info">
                    <div class="mail-title-flex">
                        <div class="mail-title">Netflix</div>
                        <div class="mail-time">9:00 AM</div>
                    </div>
                    <div class="mail-topic">Here's what's coming soon to Netflix</div>
                    <div class="mail-message">Brand new movies and shows, old favorites...</div>
                </div>
            </div>


        </div>

    </body>
</html>
