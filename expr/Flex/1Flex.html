<!DOCTYPE html>
<html>
    <head>
        <title>Grid, flex</title>
       <style>
           .grid_1{
                display: grid;
                grid-template-columns: 200px 200px;
                margin-bottom: 35px;
           }
           .flex_1{
               display: flex;
               flex-direction: row;
               margin-bottom: 35px;
               height: 70px;
                border-style: solid;
                border-color: black;
                border-width: 1px;
                width: 500px;
                justify-content:space-between;
                align-items: top;
                text-align: center;
                flex-wrap: wrap;

           }
           .left_{
                display: block;
                background-color: lightblue;
                width: 100px;
           }
           .middle_{
               display: block;
               background-color: lightpink;
               width: 100px;
           }
           .right_{
               display: block;
               background-color: lightblue;
               width: 100px;
            }

       </style> 
    </head>
    <body>
        <div class="grid_1">
            <div style="background-color: lightblue; padding: 20px;">div1</div>
            <div style="background-color: lightpink; padding: 20px;">div2</div>
            <div style="background-color: lightblue; padding: 20px;">200px</div>
            <div style="background-color: lightpink;padding: 20px;">200px</div>
        </div>

        <div class="flex_1">
            <div style="background-color: lightblue; width: 75px;">div1</div>
            <div style="background-color: lightpink; flex: 1;">div2</div>
            <div style="background-color: lightblue; flex: 2;">div3</div>
        </div>

        <div class="flex_1">
            <div class="left_">div1</div>
            <div class="middle_">div2</div>
            <div class="right_">div3</div>
        </div>

        <div class="flex_1">
            <div class="left_">div1</div>
            <div class="middle_">div2</div>
            <div class="right_">div3</div>
            <div class="middle_">div4</div>
            <div class="right_">div5</div>

            <div class="left_">div1</div>
            <div class="middle_">div2</div>
            <div class="right_">div3</div>
            <div class="middle_">div4</div>
            <div class="right_">div5</div>
            
            <div class="left_">div1</div>
            <div class="middle_">div2</div>
            <div class="right_">div3</div>
            <div class="middle_">div4</div>
            <div class="right_">div5</div>
        </div>
    </body>
</html>
