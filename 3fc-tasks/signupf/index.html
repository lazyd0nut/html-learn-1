<!DOCTYPE html>
<html>
    <head>
        <title>Sign-Up</title>
        <style>
            .form1,
            .form2{
                width: 90px;
                height: 20px;
                padding-right: 15px;
                padding-left: 10px;
                padding-top: 7px;
                padding-bottom: 7px;
                border-width: 1px;
                border-radius: 8px;
                margin-bottom: 8px;
                border-style: solid;
            }
            .form3{
                width: 211px;
                height: 20px;
                padding-right: 15px;
                padding-left: 10px;
                padding-top: 7px;
                padding-bottom: 7px;
                border-width: 1px;
                border-radius: 8px;
                margin-bottom: 7px;
                border-style: solid;
            }
            .bttn{
                width: 240px;
                height: 40px;
                border-radius: 8px;
                border: none;
                padding-top: 10px;
                padding-bottom: 10px;
                padding-right: 30px;
                padding-left: 30px;
                background-color: rgb(76, 124, 229);
                color: white;
                transition: all 0.15s; 
            }
            .bttn:hover{
                cursor: pointer;
                opacity: 0.7;
            }
            .bttn:active{
                opacity: 0.5;
            }
        </style>
    </head>
    <body>
        <div style="text-align:center;">
            <input class="form1" type="text" placeholder="First name">
            <input class="form2" type="text" placeholder="Second name">
        </div>
        <div style="text-align:center;"><input class="form3" type="text" placeholder="Email"></div>
        <div style="text-align:center;"><button class="bttn">Sign Up</button></div>
    </body>
</html>
