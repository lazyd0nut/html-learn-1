<!DOCTYPE html>
<html>
    <head>
        <title>Google</title>
        <style>
            .srch1{
                width: 500px;
                border-radius: 40px;
                border: none;
                box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
                padding: 10px;
                font-size: 16px;
                background-color: rgb(32, 33, 36);
            }
            .srch1:focus, input:focus{
                outline: none;
                color: white;
            }
            .bttn{
                border: none;
                padding: 10px;
                margin-right: 10px;
                background-color: rgb(56, 58, 62);
                color: white;
                border-radius: 6px;
            }
        </style>
    </head>
    <body style="background-color: rgb(32, 33, 36);">
        <div style="text-align: center; margin-top: 100px;"><img src="google.png" alt="Google"></div>
        <div style="text-align: center; margin-top: 20px;"><input class="srch1" type="search" placeholder="Search Google or type a URL"></div>
        <div style="text-align: center; margin-top: 20px;">
            <button class="bttn">Google Search</button>
            <button class="bttn">I'm Feeling Lucky!</button>
        </div>
    </body>
</html>
