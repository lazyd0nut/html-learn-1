<!DOCTYPE html>
<html>
    <head>
        <title>Uber</title>
        <style>
            .hdr{
                font-family: Arial, Helvetica, sans-serif;
                font-size: 30px;
                margin-bottom: 18px;
            }
            .form1{
                border: none;
                background-color: rgb(242, 242, 242);
                width: 290px;
                height: 36px;
                padding-left: 15px;
                margin-bottom: 6px;
            }
            .form2{
                border: none;
                background-color: rgb(242, 242, 242);
                width: 290px;
                height: 36px;
                padding-left: 15px;
                margin-bottom: 6px;
            }
            .buttn1{
                border: none;
                background-color: black;
                color: white;
                padding: 12px;
                margin-right: 10px;
            }
            .buttn2{
                border: none;
                background-color: rgb(242, 242, 242);
                padding: 14px;
            }
        </style>
    </head>
    <body>
        <div class="hdr">Request a ride now</div>
        <div><input class="form1" type="text" placeholder="Enter pickup location"></div>
        <div><input class="form2" type="text" placeholder="Enter destination"></div>
        <div>
            <button class="buttn1">Request now</button>
            <button class="buttn2">Schedule for later</button>
        </div>
    </body>
</html>
